services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CLOUDSQL_HOST=postgres
      - CLOUDSQL_PORT=5432
      - CLOUDSQL_DATABASE=adr_ai_agent
      - CLOUDSQL_USER=postgres
      - CLOUDSQL_PASSWORD=postgres
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=adr_ai_agent
      - GCS_EMULATOR_HOST=http://gcs:4443
      - STORAGE_EMULATOR_HOST=http://gcs:4443
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      gcs:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: adr_ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443"]
    volumes:
      - gcsdata:/data

volumes:
  pgdata:
  mongodata:
  gcsdata:
