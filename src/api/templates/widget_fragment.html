<div data-cc-widget="root" data-cc-session="{{ session_id }}" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#2c3e50;">
  <div style="background:#7d3f98;color:#fff;padding:12px 16px;font-weight:600;">ADR AI Assistant</div>
  <div data-cc-role="messages" role="log" aria-live="polite" style="min-height:180px;max-height:360px;overflow-y:auto;padding:16px;background:#fafbfc;border:1px solid #e5e5e5;"></div>
  <div style="display:flex;padding:12px;border-top:1px solid #e5e5e5;gap:8px;">
    <input data-cc-role="input" type="text" placeholder="Ask a question about the ADR documents..." autocomplete="off" aria-label="Chat input" style="flex:1;padding:10px 12px;border:1px solid #ccc;border-radius:20px;font-size:14px;">
    <button data-cc-role="send" type="button" style="padding:10px 20px;background:#7d3f98;color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:600;">Send</button>
  </div>
</div>
