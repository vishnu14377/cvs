<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareConnect Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      background: #f5f7fa;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #cc-header {
      background: #6f2c91;
      color: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #cc-header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    #cc-close-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    #cc-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cc-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .cc-message.user {
      align-self: flex-end;
      background: #6f2c91;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .cc-message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .cc-message.assistant p { margin: 0 0 8px; }
    .cc-message.assistant p:last-child { margin-bottom: 0; }
    .cc-message.assistant ul,
    .cc-message.assistant ol { padding-left: 20px; margin: 4px 0; }

    #cc-spinner {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
    }

    #cc-spinner.visible { display: flex; gap: 4px; align-items: center; }

    #cc-spinner span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6f2c91;
      animation: bounce 1.2s infinite ease-in-out;
    }

    #cc-spinner span:nth-child(2) { animation-delay: 0.2s; }
    #cc-spinner span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    #cc-input-area {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    #cc-input {
      flex: 1;
      border: 1px solid #cbd5e0;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
    }

    #cc-input:focus { border-color: #6f2c91; }

    #cc-send-btn {
      background: #6f2c91;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #cc-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #cc-send-btn:hover:not(:disabled) { background: #5a2177; }

    .cc-layout-embedded #cc-header { display: none; }
    .cc-layout-embedded { background: #fff; }

    #cc-toggle-btn {
      display: none;
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, #6f2c91 0%, #5a2177 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    #cc-toggle-btn:hover { opacity: 0.9; }

    .cc-layout-embedded #cc-toggle-btn { display: block; }

    .cc-layout-embedded #cc-chat-container { display: none; }
    .cc-layout-embedded.cc-chat-visible #cc-chat-container { display: flex; flex-direction: column; flex: 1; }
    .cc-layout-embedded.cc-chat-visible #cc-toggle-btn span.cc-show-label { display: none; }
    .cc-layout-embedded.cc-chat-visible #cc-toggle-btn span.cc-hide-label { display: inline; }
    .cc-layout-embedded:not(.cc-chat-visible) #cc-toggle-btn span.cc-show-label { display: inline; }
    .cc-layout-embedded:not(.cc-chat-visible) #cc-toggle-btn span.cc-hide-label { display: none; }
  </style>
</head>
<body class="{{ 'cc-layout-embedded' if layout == 'embedded' else '' }}">
  <div id="cc-header">
    <h1>AI Agent Assistance</h1>
    <button id="cc-close-btn" aria-label="Close">&#x2715;</button>
  </div>

  <button id="cc-toggle-btn" type="button">
    <span class="cc-show-label">Show AI Assistant</span>
    <span class="cc-hide-label">Hide AI Assistant</span>
  </button>

  <div id="cc-chat-container" style="display:flex;flex-direction:column;flex:1;">
    <div id="cc-messages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="cc-message assistant">
        <p>Hello! I&#39;m your CareConnect assistant. How can I help you today?</p>
      </div>
      <div id="cc-spinner" role="status" aria-label="Loading response">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="cc-input-area">
      <textarea
        id="cc-input"
        placeholder="Type your question…"
        rows="1"
        aria-label="Message input"
      ></textarea>
      <button id="cc-send-btn">Send</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var SESSION_ID    = {{ session_id|tojson }};
      var API_BASE      = {{ api_base|tojson }};
      var AUTH_TOKEN    = {{ auth_token|tojson }};
      var MODE          = {{ mode|tojson }};
      // When CARECONNECT_PARENT_ORIGIN env is unset, we fall back to "*" because
      // the Unqork parent origin varies per deployment. Set this env var in any
      // environment where the parent origin is known and fixed.
      var PARENT_ORIGIN = {{ parent_origin|tojson }};

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      var messagesEl = document.getElementById("cc-messages");
      var inputEl    = document.getElementById("cc-input");
      var sendBtn    = document.getElementById("cc-send-btn");
      var spinner    = document.getElementById("cc-spinner");
      var closeBtn   = document.getElementById("cc-close-btn");

      // ── postMessage helpers ───────────────────────────────────────────────
      function postToParent(type, extra) {
        var payload = Object.assign({ source: "careconnect", type: type }, extra || {});
        try { window.parent.postMessage(payload, PARENT_ORIGIN || "*"); } catch (_) {}
      }

      // ── Height reporting via ResizeObserver ───────────────────────────────
      var lastHeight = 0;
      var ro = new ResizeObserver(function () {
        var h = document.body.scrollHeight;
        if (h !== lastHeight) {
          lastHeight = h;
          postToParent("careconnect:height", { height: h });
        }
      });
      ro.observe(document.body);

      // ── Listen for messages from parent ───────────────────────────────────
      window.addEventListener("message", function (ev) {
        if (!ev.data || typeof ev.data !== "object") return;
        if (ev.data.type === "careconnect:reset") {
          clearMessages();
        }
      });

      // ── Toggle button (embedded layout) ────────────────────────────────────
      var toggleBtn = document.getElementById("cc-toggle-btn");
      toggleBtn.addEventListener("click", function () {
        document.body.classList.toggle("cc-chat-visible");
        postToParent("careconnect:height", { height: document.body.scrollHeight });
      });

      // ── Close button ──────────────────────────────────────────────────────
      closeBtn.addEventListener("click", function () {
        document.body.classList.remove("cc-chat-visible");
        postToParent("careconnect:close");
      });

      // ── Auto-resize textarea ──────────────────────────────────────────────
      inputEl.addEventListener("input", function () {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
      });

      // ── Send on Enter (no shift) ──────────────────────────────────────────
      inputEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", sendMessage);

      // ── DOM helpers ───────────────────────────────────────────────────────
      function appendMessage(role, htmlContent) {
        var div = document.createElement("div");
        div.className = "cc-message " + role;
        if (role === "user") {
          div.textContent = htmlContent;
        } else {
          div.innerHTML = htmlContent;
        }
        messagesEl.insertBefore(div, spinner);
        scrollToBottom();
      }

      function clearMessages() {
        var nodes = messagesEl.querySelectorAll(".cc-message");
        nodes.forEach(function (n) { n.remove(); });
        appendMessage("assistant", "<p>Conversation reset. How can I help you?</p>");
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setLoading(loading) {
        sendBtn.disabled = loading;
        inputEl.disabled = loading;
        if (loading) {
          spinner.classList.add("visible");
          scrollToBottom();
        } else {
          spinner.classList.remove("visible");
        }
      }

      // ── Core send ─────────────────────────────────────────────────────────
      function sendMessage() {
        var text = inputEl.value.trim();
        if (!text) return;

        appendMessage("user", text);
        inputEl.value = "";
        inputEl.style.height = "auto";
        setLoading(true);

        var url = (API_BASE || "") + "/widget/v1/chat/query";
        var headers = { "Content-Type": "application/json" };
        if (AUTH_TOKEN) { headers["Authorization"] = "Bearer " + AUTH_TOKEN; }

        fetch(url, {
          method: "POST",
          headers: headers,
          body: JSON.stringify({ session_id: SESSION_ID, message: text }),
        })
          .then(function (res) {
            if (!res.ok) {
              return res.json().catch(function () { return {}; }).then(function (err) {
                throw new Error(err.detail || ("HTTP " + res.status));
              });
            }
            return res.json();
          })
          .then(function (data) {
            var text = data.content_text || "";
            // Clean inline gs:// URIs from the AI response text
            text = text.replace(/\(Source:\s*gs:\/\/[^\)]+\)/g, "");
            text = text.replace(/---\s*gs:\/\/\S+\s*\|\s*Page\s*\d+\s*---/g, "");
            text = text.replace(/gs:\/\/\S+/g, "");
            text = text.replace(/\n{3,}/g, "\n\n").trim();
            var html = "<p>" + escapeHtml(text).replace(/\n/g, "<br>") + "</p>";
            // Extract source links from the full conversation HTML
            var srcMatch = (data.content_html || "").match(/<a [^>]*href="[^"]*"[^>]*>[^<]+<\/a>/g);
            if (srcMatch) {
              var seen = {};
              var unique = srcMatch.filter(function(a) {
                var label = a.replace(/<[^>]+>/g, "");
                if (seen[label]) return false;
                seen[label] = true;
                return true;
              });
              html += '<div style="margin-top:8px;padding-top:6px;border-top:1px solid #e2e8f0;font-size:11px;color:#6f2c91;">Sources: ' + unique.join(", ") + '</div>';
            }
            appendMessage("assistant", html);
          })
          .catch(function (err) {
            appendMessage("assistant", "<p>Sorry, something went wrong: " + escapeHtml(err.message || "") + "</p>");
          })
          .finally(function () {
            setLoading(false);
          });
      }

      // ── Signal ready ──────────────────────────────────────────────────────
      postToParent("careconnect:ready", { session_id: SESSION_ID, mode: MODE });
    })();
  </script>
</body>
</html>
